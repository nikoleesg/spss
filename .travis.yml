language: php
dist: trusty

branches:
  only:
    - master
    - /[0-9]+\.[0-9]+\.[0-9]+/

cache:
  directories:
    - $HOME/.composer/cache/

php:
  - 8.0
  - 8.1
  - 8.2
  - 8.3

#env:
#  matrix:
#    - COMPOSER_FLAGS="--prefer-lowest"
#    - COMPOSER_FLAGS=""

install:
  - travis_retry composer update --no-interaction --no-suggest --prefer-source

before_script:
  - phpenv config-rm xdebug.ini || true

script:
  - composer test

#matrix:
#  allow_failures:
#    - php: nightly
